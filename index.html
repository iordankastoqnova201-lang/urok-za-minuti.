<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Умен генератор PRO+</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

.container{
  max-width:1100px;
  margin:30px auto;
  background:white;
  border-radius:20px;
  padding:25px;
}

.hero{
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:white;
  padding:25px;
  border-radius:15px;
}

h1{margin:0;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

select,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.output{
  margin-top:20px;
  padding:20px;
  background:#f9fafb;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Умен генератор PRO+</h1>
<p>Създава урок, тест и задачи автоматично</p>
</div>

<div class="grid">
<div>
<label>Предмет</label>
<select id="subject">
<option>Математика</option>
<option>Български език</option>
<option>Английски език</option>
<option>История</option>
<option>География</option>
<option>Физика</option>
<option>Химия</option>
</select>
</div>

<div>
<label>Клас</label>
<select id="grade">
<option>5 клас</option>
<option>6 клас</option>
<option>7 клас</option>
</select>
</div>
</div>

<div>
<label>Тема</label>
<input id="topic" placeholder="напр. Проценти">
</div>

<button onclick="generate()">Генерирай урок</button>

<div class="output" id="output">
Натисни бутона за генериране
</div>

</div>

<script>
function generate(){
let subject=document.getElementById("subject").value;
let grade=document.getElementById("grade").value;
let topic=document.getElementById("topic").value;

document.getElementById("output").innerHTML=
"<h2>Урок</h2>"+
"<b>Предмет:</b> "+subject+"<br>"+
"<b>Клас:</b> "+grade+"<br>"+
"<b>Тема:</b> "+topic+"<br><br>"+

"<h3>Структура:</h3>"+
"1. Въведение<br>"+
"2. Обяснение<br>"+
"3. Упражнения<br>"+
"4. Домашна работа<br><br>"+

"<h3>Задачи:</h3>"+
"- Пример 1<br>"+
"- Пример 2<br>"+
"- Пример 3";
}
</script>

</body>
</html>
